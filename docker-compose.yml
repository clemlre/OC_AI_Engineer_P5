services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: attrition_user
      POSTGRES_PASSWORD: attrition_pass
      POSTGRES_DB: attrition_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attrition_user -d attrition_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8567:7860"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://attrition_user:attrition_pass@db:5432/attrition_db
      ENVIRONMENT: prod
    volumes:
      - ./ml_models:/app/ml_models
      - ./data:/app/data

volumes:
  pgdata:
